<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Pruebas</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        #salida, #vel, #permiso{
            padding:20px;
            border:solid black 5px;
        }
    </style>
    <link rel="shortcut icon" href="#" />
</head>
<body>
    <div id="permiso">permiso: esperando</div>
    <div id="salida"></div>
    <div id="vel"></div>
    
    <script defer>
        let accelerometer = null;
        let salida = document.getElementById("salida");
        let vel = document.getElementById("vel");
        let permiso = document.getElementById("permiso");
        let maxX = 0;
        let maxY = 0;
        let maxZ = 0;
        salida.innerHTML="inicio";
        navigator.permissions.query({ name: "accelerometer" }).then((result) => {
            permiso.innerHTML="permiso: "+result.state;
            if (result.state === "denied") {
                console.log("No da permiso para usar el sensor, usar el slider de abajo");
                salida.innerHTML("Permiso denegado para usar el sensor.");
                //poner slider
                return;
            }
            try {
                salida.innerHTML="lectura correcta del sensor";
                accelerometer = new Accelerometer({ frequency: 60 });
                accelerometer.addEventListener("reading", () => {
                    if(accelerometer.x > maxX){
                        maxX = accelerometer.x;
                    }
                    if(accelerometer.y > maxY){
                        maxY = accelerometer.y;
                    }
                    if(accelerometer.z > maxZ){
                        maxZ = accelerometer.z;
                    }
                    
                    vel.innerHTML=`X-axis peak `+maxX;
                    vel.innerHTML+=`<br>Y-axis peak `+maxY;
                    vel.innerHTML+=`<br>Z-axis peak `+maxZ;
                });
                accelerometer.start();
                
            } catch (error) {
                // Handle construction errors.
                if (error.name === "SecurityError") {
                    // See the note above about permissions policy.
                    salida.innerHTML="Sensor construction was blocked by a permissions policy.";
                } else if (error.name === "ReferenceError") {
                    salida.innerHTML="Sensor is not supported by the User Agent.";
                } else {
                    salida.innerHTML="Ha ocurrido un error completamente diferente "+error.name;
                    throw error;
                }
            }
        });
    </script>
</body>
</html>
